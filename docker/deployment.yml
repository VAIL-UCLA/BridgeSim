apiVersion: apps/v1
kind: Deployment
metadata:
  name: abhi-metabench-mdsn-deployment
spec:
  # This tells the deployment to ensure 1 replica of your pod is always running.
  replicas: 1
  selector:
    matchLabels:
      app: abhi-metabench-mdsn-pod
  template:
    # This metadata gets applied to the Pods created by this deployment.
    # The 'app' label must match the 'matchLabels' in the selector above.
    metadata:
      labels:
        app: abhi-metabench-mdsn-pod
    spec:
      affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                  - us-west
                - key: nvidia.com/gpu.product
                  operator: In
                  values:
                  - NVIDIA-A100-SXM4-80GB
                  - NVIDIA-L40
                  - NVIDIA-GeForce-RTX-3090
      # tolerations:
      #   - key: "nautilus.io/reservation"
      #     operator: "Equal"
      #     #value: "cogrob"
      #     effect: "NoSchedule"
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            # --- IMPORTANT ---
            # Replace this with the exact name of your existing PVC.
            claimName: abhi-vol
        - name: e2e-storage
          persistentVolumeClaim:
            claimName: closed-loop-e2e
        - name: shared-nuscenes-storage
          persistentVolumeClaim:
            claimName: cogrob-avl-west-vol
      containers:
      - name: metabench-container
        # --- IMPORTANT ---
        # Replace this with the full path to your image on Docker Hub or another registry.
        # For example: "yourusername/metabench-app:latest"
        image: abhiturtles/metabench-mdsn:latest

        env:
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,graphics,utility"

        # This command keeps the pod running indefinitely so you can 'exec' into it.
        # You can replace this with your actual training script command later.
        command: ["/bin/bash", "-c", "--"]
        args: ["while true; do sleep 30; done;"]

        ports:
        - name: vnc-port
          containerPort: 5901

        volumeMounts:
        - name: model-storage
          # This is the path inside the container where the PVC will be mounted.
          # You will read and write your data to this directory.
          mountPath: /workspace
        - name: e2e-storage
          mountPath: /closed_loop_workspace
        - name: shared-nuscenes-storage
          mountPath: /cogrob-avl-west
          readOnly: true
        
        resources:
          # Define the resource limits for the container.
          # Kubernetes will ensure the pod doesn't exceed these.
          limits:
            # This is the critical line to request a GPU from the cluster.
            nvidia.com/gpu: "1"
            
            # Requesting significant CPU and Memory for a training job.
            cpu: "4"
            memory: "96Gi"
            ephemeral-storage: 600Gi
            
          # Define the minimum resources the container needs to start.
          requests:
            nvidia.com/gpu: "1"
            cpu: "4"
            memory: "96Gi"
            ephemeral-storage: 400Gi